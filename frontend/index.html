<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PinGuard — Sistema de Monitoreo y Administración de Red en AWS. Dashboard en tiempo real, gestión de interfaces y visor de logs.">
    <meta name="author" content="SDN Team">
    <meta name="theme-color" content="#091e33">
    <title>PinGuard | Sistema de Monitoreo de Red</title>

    <!-- Favicon -->
    <link rel="icon" href="assets/logo-pinguard.png">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

    <!-- App Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- ====== APP HEADER ====== -->
    <header class="app-header" id="app-header">
        <!-- Rendered by app.js -->
    </header>

    <!-- ====== MAIN CONTENT ====== -->
    <main class="app-main" id="app-main">
        <!-- Views rendered dynamically by SPA router -->
        <div class="login-wrapper">
            <div class="loading-state">
                <div class="spinner spinner-lg"></div>
                <span>Iniciando PinGuard...</span>
            </div>
        </div>
    </main>

    <!-- ====== SCRIPTS ====== -->
    <!-- Order matters: api first (no dependencies), then auth, then feature modules, then app (orchestrator) -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/logs.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
